<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Sound to MP3</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>Browser Sound to MP3</h1>
      <p class="note">
        画面共有ダイアログで「システム音声共有」をONにしてください。イヤホン使用中でも録音できます。
      </p>

      <div class="actions">
        <button id="startButton" class="btn btn-start">録音開始</button>
        <button id="stopButton" class="btn btn-stop" disabled>録音停止</button>
      </div>

      <p id="status" class="status" aria-live="polite">待機中</p>
    </main>

    <script src="lib/lame.min.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
</html>
