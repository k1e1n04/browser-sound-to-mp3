<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recorder</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>録音ウィンドウ</h1>
      <p class="note">開始後はこのウィンドウを閉じないでください。フォーカスを他へ移しても録音は継続します。</p>

      <div class="actions">
        <button id="startButton" class="btn btn-start">録音開始</button>
        <button id="stopButton" class="btn btn-stop" disabled>録音停止</button>
      </div>

      <p id="status" class="status" aria-live="polite">待機中</p>
    </main>

    <script src="lib/lame.min.js"></script>
    <script type="module" src="recorder.js"></script>
  </body>
</html>
